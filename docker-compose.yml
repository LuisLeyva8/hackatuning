version: '3.8'

services:
  postgres:
    image: postgres:14-alpine
    container_name: hackatuning_postgres
    environment:
      POSTGRES_DB: hackatuning
      POSTGRES_USER: hackatuning
      POSTGRES_PASSWORD: hackatuning123
      POSTGRES_HOST_AUTH_METHOD: md5
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: hackatuning_redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    restart: unless-stopped

  mongo:
    image: mongo:6-jammy
    container_name: hackatuning_mongo
    environment:
      MONGO_INITDB_DATABASE: hackatuning
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  mongo_data:
